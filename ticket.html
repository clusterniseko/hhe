<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hilton Niseko Village - Tu Ticket</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: hsl(220, 55%, 14%);
      color: hsl(40, 50%, 95%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    h1 { font-family: 'Playfair Display', serif; }
    .wrapper {
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: floatIn 0.6s ease-out;
    }
    .hotel-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: hsl(40, 60%, 65%);
      margin-bottom: 2rem;
    }
    #ticket-view img {
      width: 280px;
      cursor: pointer;
      transition: transform 0.3s;
      filter: drop-shadow(0 0 35px hsla(40, 80%, 50%, 0.35));
    }
    #ticket-view img:hover { transform: scale(1.05); }
    #ticket-view p {
      color: hsl(220, 15%, 55%);
      font-size: 0.875rem;
      margin-top: 1.5rem;
    }
    /* Estado de carga al usar ticket */
    #ticket-view .loading-msg {
      color: hsl(40, 60%, 65%);
      font-size: 0.875rem;
      margin-top: 1.5rem;
      display: none;
    }
    /* Error */
    .ticket-error {
      background: hsla(0, 75%, 55%, 0.12);
      border: 1px solid hsla(0, 75%, 55%, 0.4);
      color: hsl(0, 85%, 70%);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-top: 1rem;
      font-size: 0.875rem;
      display: none;
    }
    #gracias {
      display: none;
    }
    #gracias h1 {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1rem;
      color: hsl(40, 50%, 95%);
    }
    #gracias .nombre {
      color: hsl(40, 80%, 55%);
      font-size: 1.125rem;
      font-weight: 500;
    }
    #gracias .gracias-sub {
      color: hsl(220, 15%, 55%);
      font-size: 0.875rem;
      margin-top: 0.75rem;
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile (max 480px) ── */
    @media (max-width: 480px) {
      body {
        padding: 1.5rem 1rem;
        align-items: flex-start;
        padding-top: 3rem;
      }

      .wrapper {
        max-width: 100%;
      }

      .hotel-name {
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        margin-bottom: 1.5rem;
      }

      #ticket-view img {
        width: 220px;
      }

      #gracias h1 {
        font-size: 2.75rem;
      }

      #gracias .nombre {
        font-size: 1rem;
      }
    }

    /* ── Small phones (max 360px) ── */
    @media (max-width: 360px) {
      #ticket-view img {
        width: 180px;
      }

      #gracias h1 {
        font-size: 2.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <p class="hotel-name">Hilton Niseko Village</p>

    <div id="ticket-view">
      <img id="ticket-img" src="ticket-cheers.png" alt="Ticket Brindis">
      <p id="hint-text">Click the ticket to use it</p>
      <p class="loading-msg" id="loading-msg">Processing…</p>
      <div class="ticket-error" id="ticket-error"></div>
    </div>

    <div id="gracias">
      <h1 id="gracias-heading">Thank<br>You</h1>
      <p class="nombre" id="nombre-display"></p>
      <p class="gracias-sub" id="gracias-sub"></p>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────
    // 🔧 CONFIGURACIÓN — Debe coincidir con el API_URL de index.html
    // ─────────────────────────────────────────────────────────────────
    const API_URL = "https://hhe-production.up.railway.app";

    // ── Thank-you messages per language ───────────────────────────────
    const thankYou = {
      en: { heading: "Thank\nYou",       sub: "We hope you enjoy your stay." },
      ja: { heading: "ありがとう\nございます", sub: "ご滞在をお楽しみください。" },
      ko: { heading: "감사합니다",           sub: "즐거운 숙박이 되시길 바랍니다." },
      zh: { heading: "谢谢\n您",            sub: "祝您入住愉快。" },
      fr: { heading: "Merci\nBeaucoup",   sub: "Nous espérons que vous profiterez de votre séjour." },
      es: { heading: "Muchas\nGracias",   sub: "Esperamos que disfrute su estancia." },
    };

    const params  = new URLSearchParams(window.location.search);
    let nombre    = params.get("nombre");
    let correo    = params.get("correo");
    let room      = params.get("room");
    let lang      = params.get("lang") || "en";

    // Modo demo si faltan parámetros
    if (!nombre || !correo || !room) {
      nombre = "Usuario Demo";
      correo = "demo@local.com";
      room   = "000";
    }

    // ── localStorage helpers ──────────────────────────────────────────
    function getUsedTickets() {
      try { return JSON.parse(localStorage.getItem("hnv_used_tickets") || "[]"); }
      catch { return []; }
    }
    function markTicketUsed(name, email) {
      const list = getUsedTickets();
      list.push({ name: name.toLowerCase(), email: email.toLowerCase() });
      localStorage.setItem("hnv_used_tickets", JSON.stringify(list));
    }
    function isTicketAlreadyUsed(name, email) {
      const list = getUsedTickets();
      const lowerName  = name.toLowerCase();
      const lowerEmail = email.toLowerCase();
      // Block if EITHER name OR email was already used
      return list.some(r => r.name === lowerName || r.email === lowerEmail);
    }

    // Al cargar, verificar si este ticket ya fue usado (localStorage primero)
    if (isTicketAlreadyUsed(nombre, correo)) {
      mostrarGracias();
      bloquearBack();
    } else {
      // También verificar con el servidor como respaldo
      checkTicketStatusServer();
    }

    async function checkTicketStatusServer() {
      try {
        const res = await fetch(`${API_URL}/check-ticket?email=${encodeURIComponent(correo)}&nombre=${encodeURIComponent(nombre)}`);
        const data = await res.json();
        if (data.ticket_used) {
          markTicketUsed(nombre, correo);
          mostrarGracias();
          bloquearBack();
        }
      } catch (err) {
        console.warn("Could not verify ticket status:", err);
      }
    }

    // ── Lógica de doble click ──
    let confirmado = false;

    document.getElementById("ticket-img").addEventListener("click", async function() {

      // Primer click — confirmar intención
      if (!confirmado) {
        document.getElementById("hint-text").textContent = "Click again to confirm";
        confirmado = true;
        return;
      }

      // Segundo click — usar el ticket
      const img = document.getElementById("ticket-img");
      const loadingMsg = document.getElementById("loading-msg");
      const errorEl   = document.getElementById("ticket-error");

      img.style.pointerEvents = "none";
      img.style.opacity = "0.6";
      document.getElementById("hint-text").style.display = "none";
      loadingMsg.style.display = "block";
      errorEl.style.display = "none";

      // Check localStorage again before server call (race condition guard)
      if (isTicketAlreadyUsed(nombre, correo)) {
        markTicketUsed(nombre, correo);
        mostrarGracias();
        bloquearBack();
        return;
      }

      try {
        const res = await fetch(`${API_URL}/use-ticket`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: correo, nombre })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          markTicketUsed(nombre, correo);
          mostrarGracias();
          bloquearBack();
        } else if (res.status === 409) {
          // Ya usado en el servidor
          markTicketUsed(nombre, correo);
          mostrarGracias();
          bloquearBack();
        } else {
          throw new Error(data.error || "Error desconocido");
        }

      } catch (err) {
        img.style.pointerEvents = "auto";
        img.style.opacity = "1";
        loadingMsg.style.display = "none";
        document.getElementById("hint-text").style.display = "block";
        errorEl.textContent = "Could not connect to server. Please try again.";
        errorEl.style.display = "block";
        confirmado = false;
      }
    });

    // ── Funciones ──

    function mostrarGracias() {
      document.getElementById("ticket-view").style.display = "none";
      const gracias = document.getElementById("gracias");
      gracias.style.display = "block";
      gracias.style.animation = "floatIn 0.6s ease-out";
      const t = thankYou[lang] || thankYou.en;
      document.getElementById("gracias-heading").innerHTML = t.heading.replace("\n", "<br>");
      document.getElementById("gracias-sub").textContent = t.sub;
      document.getElementById("nombre-display").textContent = nombre;
    }

    function bloquearBack() {
      history.pushState(null, null, location.href);
      window.onpopstate = function () { history.go(1); };
    }
  </script>
</body>
</html>
